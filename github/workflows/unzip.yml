name: Unzip archive

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          mkdir -p extracted
          unzip -o "mavix_flutter_v8.2.0.zip" -d extracted

      - name: Move extracted files to root
        run: |
          shopt -s dotglob
          mv extracted/* .
          rm -rf extracted
          rm -f mavix_flutter_v8.2.0.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Extract ZIP archive" || echo "No changes to commit"
          git push
